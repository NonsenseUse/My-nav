<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Навигатор Pro</title>
    
    <!-- Настройки для превращения в приложение (PWA) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/854/854878.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/854/854878.png">
    
    <!-- Манифест для Android и iOS -->
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%D0%9D%D0%B0%D0%B2%D0%B8%D0%B3%D0%B0%D1%82%D0%BE%D1%80%20Pro%22%2C%22short_name%22%3A%22%D0%9D%D0%B0%D0%B2%D0%B8%D0%B3%D0%B0%D1%82%D0%BE%D1%80%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%232c3e50%22%2C%22theme_color%22%3A%22%232c3e50%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Fcdn-icons-png.flaticon.com%2F512%2F854%2F854878.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; background-color: #f4f6f9; color: #333; overflow: hidden; }
        #app-container { display: flex; flex-direction: column; height: 100%; }
        header { background: #2c3e50; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; padding-top: calc(12px + env(safe-area-inset-top)); }
        header h1 { margin: 0; font-size: 1.2rem; }
        #main-content { display: flex; flex: 1; position: relative; overflow: hidden; }
        #sidebar { width: 360px; background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.1); padding: 20px; display: flex; flex-direction: column; overflow-y: auto; z-index: 999; }
        #map { flex: 1; height: 100%; }
        .section { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .section-title { font-weight: bold; margin-bottom: 10px; color: #2c3e50; font-size: 0.95rem; text-transform: uppercase; }
        .input-group { display: flex; margin-bottom: 10px; gap: 5px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: 600; }
        button:hover { background: #2980b9; }
        button.accent { background: #2ecc71; width: 100%; padding: 12px; font-size: 1rem; margin-top: 5px; }
        button.accent:hover { background: #27ae60; }
        button.danger { background: #e74c3c; padding: 5px 10px; font-size: 0.8rem; }
        .ocr-box { background: #f8f9fa; border: 2px dashed #cbd5e1; border-radius: 6px; padding: 15px; text-align: center; cursor: pointer; position: relative; }
        .ocr-box input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .address-list { list-style: none; padding: 0; margin: 0; max-height: 250px; overflow-y: auto; border: 1px solid #eee; }
        .address-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        .address-item.start-point { background: #e8f8f5; border-left: 4px solid #2ecc71; }
        .address-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 10px; }
        .address-index { font-weight: bold; background: #7f8c8d; color: white; border-radius: 5px; padding: 2px 6px; margin-right: 8px; }
        .start-point .address-index { background: #2ecc71; }
        #stats { display: none; background: #e8f4fd; border: 1px solid #d4e6f1; padding: 12px; border-radius: 4px; margin-top: 15px; }
        #google-maps-btn-container { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .loading { display: none; text-align: center; padding: 10px; font-size: 0.9rem; color: #7f8c8d; font-style: italic; }
        @media (max-width: 768px) {
            #main-content { flex-direction: column-reverse; }
            #sidebar { width: 100%; height: 50%; max-height: 400px; }
            #map { height: 50%; }
        }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <h1>📍 Навигатор Pro</h1>
    </header>
    <div id="main-content">
        <div id="sidebar">
            <div class="section">
                <div class="section-title">📷 Сканировать список адресов</div>
                <div class="ocr-box">
                    <div>📸 Сделать фото или загрузить</div>
                    <input type="file" id="ocr-file-input" accept="image/*">
                </div>
                <div id="ocr-loading" class="loading">Распознавание текста и поиск на карте...</div>
            </div>
            <div class="section">
                <div class="section-title">✏️ Добавить адрес вручную</div>
                <div class="input-group">
                    <input type="text" id="manual-address-input" placeholder="Город, улица, дом...">
                    <button id="add-address-btn">➕</button>
                </div>
            </div>
            <div class="section" style="flex: 1; display: flex; flex-direction: column;">
                <div class="section-title" style="display: flex; justify-content: space-between;">
                    <span>📍 Список точек</span>
                    <button class="danger" id="clear-all-btn">Очистить всё</button>
                </div>
                <ul class="address-list" id="address-list-container"></ul>
                <div id="geo-loading" class="loading">Поиск адреса...</div>
                <button class="accent" id="optimize-btn">🚀 ОПТИМИЗИРОВАТЬ ПУТЬ</button>
                <div id="opt-loading" class="loading">Просчет кратчайшего пути...</div>
                <div id="stats">
                    <b>📊 Результат:</b><br>
                    🛣️ Дистанция: <span id="stat-distance">0</span> км<br>
                    ⏱️ Время: <span id="stat-duration">0</span> мин
                </div>
                
                <!-- Контейнер для динамических кнопок Google Maps -->
                <div id="google-maps-btn-container"></div>
            </div>
        </div>
        <div id="map"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
<script>
    let map, markers = [], routePolyline = null, points = [];
    
    window.addEventListener('DOMContentLoaded', () => {
        map = L.map('map').setView([45.6983, 9.6773], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        map.on('click', async (e) => {
            showLoading('geo-loading', true);
            let address = await reverseGeocode(e.latlng.lat, e.latlng.lng);
            showLoading('geo-loading', false);
            addPoint(e.latlng.lat, e.latlng.lng, address);
        });
        
        document.getElementById('add-address-btn').addEventListener('click', handleManualAddress);
        document.getElementById('clear-all-btn').addEventListener('click', clearAll);
        document.getElementById('optimize-btn').addEventListener('click', optimizeRoute);
        document.getElementById('ocr-file-input').addEventListener('change', handleOCR);
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,self.addEventListener("fetch",function(e)%7B%7D);');
        }
    });

    async function geocodeAddress(address) {
        let query = address;
        if (!address.toLowerCase().includes('bergamo')) query += ', Bergamo';
        try {
            let r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
            let d = await r.json();
            if (d.length > 0) return { lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon), address: d[0].display_name.split(',').slice(0,3).join(',') };
        } catch(e) {}
        return null;
    }
    
    async function reverseGeocode(lat, lng) {
        try {
            let r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
            let d = await r.json();
            return d.display_name.split(',').slice(0,3).join(',');
        } catch(e) {}
        return `Точка (${lat.toFixed(4)}, ${lng.toFixed(4)})`;
    }

    function addPoint(lat, lng, address) {
        points.push({ lat, lng, address });
        let idx = points.length - 1;
        let marker = L.marker([lat, lng], {draggable: true}).addTo(map);
        marker.bindPopup(`<b>${idx===0?'🏁 СТАРТ':'📦 Точка'}</b><br>${address}`).openPopup();
        
        marker.on('dragend', async () => {
            let pos = marker.getLatLng();
            let newAddr = await reverseGeocode(pos.lat, pos.lng);
            points[idx] = { lat: pos.lat, lng: pos.lng, address: newAddr };
            renderList(); resetRoute();
        });
        markers.push(marker);
        renderList(); resetRoute();
    }

    function renderList() {
        let c = document.getElementById('address-list-container');
        c.innerHTML = '';
        points.forEach((p, i) => {
            let li = document.createElement('li');
            li.className = `address-item ${i===0?'start-point':''}`;
            li.innerHTML = `<span class="address-index">${i===0?'БАЗА':i}</span><span class="address-text">${p.address}</span>`;
            c.appendChild(li);
        });
    }

    async function handleManualAddress() {
        let inp = document.getElementById('manual-address-input');
        if(!inp.value.trim()) return;
        showLoading('geo-loading', true);
        let res = await geocodeAddress(inp.value);
        showLoading('geo-loading', false);
        if(res) { addPoint(res.lat, res.lng, res.address); inp.value = ''; }
    }

    async function optimizeRoute() {
        if(points.length < 3) return alert('Нужен старт и хотя бы 2 точки доставки.');
        showLoading('opt-loading', true);
        
        let order = solveTSP(points);
        let reordered = order.map(i => points[i]);
        let coordStr = reordered.map(p => `${p.lng},${p.lat}`).join(';');
        
        let osrmUrl = `https://routing.openstreetmap.de/routed-car/route/v1/driving/${coordStr}?overview=full&geometries=geojson`;
        
        try {
            let r = await fetch(osrmUrl);
            let d = await r.json();
            showLoading('opt-loading', false);
            if(d.routes && d.routes.length > 0) {
                let route = d.routes[0];
                routePolyline = L.polyline(route.geometry.coordinates.map(c => [c[1], c[0]]), {color:'#3498db', weight:5}).addTo(map);
                document.getElementById('stat-distance').innerText = (route.distance/1000).toFixed(1);
                document.getElementById('stat-duration').innerText = Math.round(route.duration/60);
                document.getElementById('stats').style.display = 'block';
                points = reordered; points.pop(); renderList();
                setupGoogleMaps(points);
            }
        } catch(e) { showLoading('opt-loading', false); alert('Ошибка связи с сервером дорог.'); }
    }

    function solveTSP(pts) {
        let unvisited = Array.from({length: pts.length - 1}, (_, i) => i + 1);
        let curr = 0, route = [0];
        while(unvisited.length > 0) {
            let next = -1, minDist = Infinity, pos = -1;
            for(let i=0; i<unvisited.length; i++) {
                let t = unvisited[i];
                let d = Math.hypot(pts[curr].lat - pts[t].lat, pts[curr].lng - pts[t].lng);
                if(d < minDist) { minDist = d; next = t; pos = i; }
            }
            route.push(next); unvisited.splice(pos, 1); curr = next;
        }
        route.push(0); return route;
    }

    function setupGoogleMaps(pts) {
        let btnContainer = document.getElementById('google-maps-btn-container');
        btnContainer.innerHTML = ''; // Очищаем прошлые пачки кнопок
        
        let chunkSize = 14; // Безопасный размер пачки для Google Maps
        let totalPoints = pts.length;
        
        for (let i = 0; i < totalPoints; i += chunkSize) {
            let chunk = pts.slice(i, i + chunkSize);
            
            // Чтобы куски маршрута "склеивались", добавляем в начало следующей пачки финальную точку предыдущей
            if (i > 0) {
                chunk.unshift(pts[i - 1]);
            }
            
            let partNum = Math.floor(i / chunkSize) + 1;
            let url = "https://www.google.com/maps/dir/" + chunk.map(p => encodeURIComponent(p.address)).join('/');
            
            let btn = document.createElement('button');
            btn.style.cssText = "background: #ff5722; width: 100%; padding: 14px; font-size: 0.95rem; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.15);";
            
            let startIdx = i + 1;
            let endIdx = Math.min(i + chunkSize, totalPoints);
            btn.innerText = `🗺️ Навигатор: Часть ${partNum} (Адреса ${startIdx} - ${endIdx})`;
            
            btn.onclick = () => window.open(url, '_blank');
            btnContainer.appendChild(btn);
        }
    }

    async function handleOCR(e) {
        let file = e.target.files[0];
        if(!file) return;
        showLoading('ocr-loading', true);
        try {
            let res = await Tesseract.recognize(file, 'ita+eng');
            let lines = res.data.text.split('\n');
            for(let line of lines) {
                if(line.trim().length < 8) continue;
                let geo = await geocodeAddress(line.trim());
                if(geo) addPoint(geo.lat, geo.lng, geo.address);
            }
        } catch(err) {}
        showLoading('ocr-loading', false);
    }

    function clearAll() { markers.forEach(m => map.removeLayer(m)); markers = []; points = []; resetRoute(); renderList(); }
    function resetRoute() { if(routePolyline) map.removeLayer(routePolyline); document.getElementById('stats').style.display='none'; document.getElementById('google-maps-btn-container').innerHTML=''; }
    function showLoading(id, show) { document.getElementById(id).style.display = show ? 'block' : 'none'; }
</script>
</body>
</html>
